version: '3.8'

services:
  # Base de données MongoDB
  mongodb:
    image: mongo:7-jammy
    container_name: test24h-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: test24h
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - test24h-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: test24h-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/test24h?authSource=admin
      JWT_SECRET: votre-secret-jwt-tres-securise-changez-en-production
      JWT_EXPIRES_IN: 24h
      FRONTEND_URL: http://localhost:5173
      LOG_LEVEL: info
    ports:
      - "3001:3001"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - test24h-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => r.statusCode === 200 ? process.exit(0) : process.exit(1))"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  # Frontend (mode développement)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: test24h-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:3001/api
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - test24h-network
    command: npm run dev -- --host

  # Frontend (mode production - optionnel)
  frontend-prod:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: test24h-frontend-prod
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:3001/api
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - test24h-network
    profiles:
      - production

volumes:
  mongodb_data:
    driver: local

networks:
  test24h-network:
    driver: bridge
